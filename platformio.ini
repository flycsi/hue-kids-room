; Waveshare ESP32-C6-Touch-AMOLED-2.16 — Hue Kids Room Controller
; LVGL v9 + Arduino framework + Philips Hue local API

[env:waveshare-esp32c6-amoled]
; pioarduino 55.03.38 est deja installe dans ~/.platformio/platforms/espressif32/
; (arduino-esp32 3.3.8 avec support ESP32-C6)
platform    = espressif32@55.03.38
board       = esp32-c6-devkitc-1
framework   = arduino

board_build.flash_size  = 4MB
board_build.partitions  = default.csv


monitor_speed  = 115200
upload_speed   = 921600

build_flags =
    ; Arduino / USB
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    ; LVGL — lv_conf.h is in include/
    -D LV_CONF_INCLUDE_SIMPLE
    -D LV_LVGL_H_INCLUDE_SIMPLE
    ; Include paths
    -I include
    -I lib/waveshare_bsp
    -I lib/waveshare_bsp/src/port_bsp
    -I lib/waveshare_bsp/src/externLib
    ; C++ standard
    -std=gnu++17
    -Wno-missing-field-initializers

lib_deps =
    lvgl/lvgl @ ^9.2.0
    bblanchon/ArduinoJson @ ^7.1.0
    lewisxhe/XPowersLib @ ^0.2.3
